<title>JM's Detailing - Mobile Auto Detailing Orlando</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#080808!important;color:#efefef;font-family:Arial,sans-serif;overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0.8rem 1.5rem;background:#080808;border-bottom:1px solid #222}
.logo{color:#f0b429;font-size:1.5rem;font-weight:900;text-decoration:none;font-family:Impact,Arial,sans-serif;letter-spacing:2px}
.logo span{color:#fff}
.nav-phone{color:#f0b429;text-decoration:none;border:1px solid #f0b429;padding:0.4rem 0.9rem;font-weight:700;font-size:0.9rem;border-radius:2px}
.hero{min-height:100vh;background:#080808;display:flex;align-items:center;padding:6rem 1.5rem 4rem}
.badge{display:inline-block;background:rgba(240,180,41,0.1);border:1px solid rgba(240,180,41,0.3);color:#f0b429;padding:0.3rem 0.8rem;font-size:0.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:1.2rem;border-radius:2px}
h1{font-family:Impact,Arial,sans-serif;font-size:clamp(3rem,10vw,6rem);line-height:0.95;color:#fff;margin-bottom:1rem}
h1 span{color:#f0b429}
.sub{font-size:1rem;color:#888;line-height:1.6;max-width:440px;margin-bottom:0.6rem}
.loc{font-size:0.82rem;color:#c8861a;margin-bottom:2rem}
.btn{display:inline-block;background:linear-gradient(135deg,#f0b429,#c8861a);color:#080808;text-decoration:none;padding:0.9rem 2rem;font-weight:700;font-size:0.95rem;letter-spacing:1px;text-transform:uppercase;border-radius:2px;margin-right:0.8rem;margin-bottom:0.8rem}
.btn2{display:inline-block;border:1px solid #333;color:#efefef;text-decoration:none;padding:0.9rem 2rem;font-weight:700;font-size:0.95rem;letter-spacing:1px;text-transform:uppercase;border-radius:2px;margin-bottom:0.8rem}
.stats{display:flex;gap:2rem;margin-top:2.5rem;flex-wrap:wrap}
.sn{font-family:Impact,Arial,sans-serif;font-size:2.2rem;color:#f0b429;line-height:1}
.sl{font-size:0.7rem;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:0.2rem}
.ticker{background:linear-gradient(90deg,#c8861a,#f0b429,#c8861a);padding:0.65rem 0;overflow:hidden}
.ti{display:flex;gap:2.5rem;white-space:nowrap;width:max-content;animation:scroll 22s linear infinite}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.t{font-size:0.75rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#080808}
.t::before{content:'✦';margin-right:0.6rem;font-size:0.5rem}
section{padding:4rem 1.5rem;background:#080808}
section.alt{background:#0e0e0e}
.tag{font-size:0.7rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#f0b429;margin-bottom:0.4rem}
h2{font-family:Impact,Arial,sans-serif;font-size:clamp(2rem,5vw,3rem);color:#fff;line-height:1;margin-bottom:0.8rem}
.desc{color:#888;line-height:1.7;max-width:460px;margin-bottom:2rem}
.pnote{background:rgba(240,180,41,0.07);border:1px solid rgba(240,180,41,0.2);border-radius:2px;padding:1rem 1.2rem;margin-bottom:2rem;font-size:0.85rem;color:#aaa;line-height:1.5}
.pnote strong{color:#f0b429}
.pnote a{color:#f0b429;text-decoration:none;font-weight:600}
.grid{display:grid;grid-template-columns:1fr;gap:1px;background:#222;border:1px solid #222}
@media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr)}}
.card{background:#131313;padding:2rem;position:relative;overflow:hidden}
.card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#c8861a,#f0b429);transform:scaleX(0);transform-origin:left;transition:transform 0.3s}
.card:hover{background:#1a1a1a}
.card:hover::after{transform:scaleX(1)}
